# Hosted agent definition for Microsoft Foundry
name: time-zone-agent
description: >
  A demo hosted agent that tells the current date and time in any timezone.
  Uses a local C# function tool with Microsoft Agent Framework.
metadata:
  authors:
    - Microsoft
  tags:
    - Azure AI AgentServer
    - Microsoft Agent Framework
    - Local Tools
    - Timezone
template:
  name: time-zone-agent
  kind: hosted
  protocols:
    - protocol: responses
      version: v1
  environment_variables:
    - name: AZURE_OPENAI_ENDPOINT
      value: ${AZURE_OPENAI_ENDPOINT}
    - name: AZURE_OPENAI_DEPLOYMENT_NAME
      value: "{{chat}}"
resources:
  - kind: model
    id: gpt-5-mini
    name: chat
